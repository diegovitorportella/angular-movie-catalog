<main class="container">
  <h2>Catálogo de Filmes</h2>

  @if (errorMessage()) {
    <div class="error-message">
      {{ errorMessage() }}
    </div>
  }

  <div class="search-container">
    <input 
      type="text" 
      #searchInput 
      placeholder="Digite o nome de um filme..." 
      (keyup.enter)="onSearch(searchInput.value)"
      class="search-input"
    >
    <button (click)="onSearch(searchInput.value)" class="btn-primary">
      Buscar
    </button>
  </div>

  <div class="movie-grid">
    @for (movie of movies(); track movie.id) {
      <div [routerLink]="['/movie', movie.id]" class="movie-card">
        <img 
          [src]="'https://image.tmdb.org/t/p/w500' + movie.poster_path" 
          [alt]="movie.title" 
          class="movie-poster"
        >
        <div class="movie-info">
          <h3 class="movie-title">{{ movie.title }}</h3>
          <p class="movie-rating">⭐ {{ movie.vote_average }}</p>
        </div>
      </div>
    } @empty {
      <p class="empty-state">Nenhum filme encontrado...</p>
    }
  </div>

  <div class="pagination">
    <button 
      (click)="previousPage()" 
      [disabled]="currentPage() === 1"
      class="btn-secondary"
    >
      Anterior
    </button>
    <span class="page-indicator">Página {{ currentPage() }}</span>
    <button 
      (click)="nextPage()" 
      class="btn-secondary"
    >
      Próxima
    </button>
  </div>
</main>
