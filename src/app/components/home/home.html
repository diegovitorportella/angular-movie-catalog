<main style="padding: 20px; font-family: sans-serif;">
  <h2>Catálogo de Filmes</h2>

  <div style="margin-bottom: 30px; display: flex; gap: 10px;">
    <input 
      type="text" 
      #searchInput 
      placeholder="Digite o nome de um filme..." 
      (keyup.enter)="onSearch(searchInput.value)"
      style="padding: 10px; width: 300px; border-radius: 4px; border: 1px solid #ccc; font-size: 16px;"
    >
    <button 
      (click)="onSearch(searchInput.value)" 
      style="padding: 10px 20px; border: none; border-radius: 4px; background-color: #007bff; color: white; cursor: pointer; font-size: 16px;"
    >
      Buscar
    </button>
  </div>
  
  <div style="display: flex; flex-wrap: wrap; gap: 20px;">
    @for (movie of movies(); track movie.id) {
      
      <div 
        [routerLink]="['/movie', movie.id]" 
        style="width: 200px; border: 1px solid #ccc; border-radius: 8px; padding: 10px; text-align: center; cursor: pointer; transition: transform 0.2s;"
        onmouseover="this.style.transform='scale(1.05)'"
        onmouseout="this.style.transform='scale(1)'"
      >
        <img 
          [src]="'https://image.tmdb.org/t/p/w500' + movie.poster_path" 
          [alt]="movie.title" 
          style="width: 100%; border-radius: 4px;"
        >
        <h3 style="font-size: 18px; margin: 10px 0;">{{ movie.title }}</h3>
        <p style="margin: 5px 0;">⭐ {{ movie.vote_average }}</p>
      </div>

    } @empty {
      <p>Nenhum filme encontrado...</p>
    }
  </div>

  <div style="display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 40px; padding-bottom: 40px;">
    
    <button 
      (click)="previousPage()" 
      [disabled]="currentPage() === 1"
      style="padding: 10px 20px; font-size: 16px; border-radius: 4px; border: none; background-color: #333; color: white; cursor: pointer;"
      [style.opacity]="currentPage() === 1 ? 0.5 : 1"
    >
      Anterior
    </button>

    <span style="font-size: 18px; font-weight: bold;">
      Página {{ currentPage() }}
    </span>

    <button 
      (click)="nextPage()" 
      style="padding: 10px 20px; font-size: 16px; border-radius: 4px; border: none; background-color: #333; color: white; cursor: pointer;"
    >
      Próxima
    </button>
    
  </div>
</main>
