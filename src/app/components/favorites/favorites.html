<main class="container">
  <h2>Meus Filmes Favoritos</h2>

  <div class="movie-grid">
    @for (movie of favoritesService.favorites(); track movie.id) {
      <div [routerLink]="['/movie', movie.id]" class="movie-card">
        <img 
          [src]="'https://image.tmdb.org/t/p/w500' + movie.poster_path" 
          [alt]="movie.title" 
          class="movie-poster"
        >
        <div class="movie-info">
          <h3 class="movie-title">{{ movie.title }}</h3>
          <p class="movie-rating">⭐ {{ movie.vote_average }}</p>
        </div>
      </div>
    } @empty {
      <p class="empty-state">Você ainda não adicionou nenhum filme aos favoritos.</p>
    }
  </div>
</main>
