<main style="padding: 40px; font-family: sans-serif; max-width: 1000px; margin: 0 auto;">
  
  @if (movie()) {
    <div style="display: flex; gap: 40px; flex-wrap: wrap;">
      
      <div style="flex: 1; min-width: 300px;">
        <img 
          [src]="'https://image.tmdb.org/t/p/w500' + movie().poster_path" 
          [alt]="movie().title" 
          style="width: 100%; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.2);"
        >
      </div>

      <div style="flex: 2; min-width: 300px;">
        <h1 style="margin-top: 0; font-size: 2.5rem;">{{ movie().title }}</h1>
        <p style="font-size: 1.2rem; color: #666;">
          📅 {{ movie().release_date }} | ⭐ {{ movie().vote_average }}
        </p>

        <h3 style="margin-top: 30px;">Sinopse</h3>
        <p style="font-size: 1.1rem; line-height: 1.6; color: #333;">
          {{ movie().overview }}
        </p>

        <a 
          routerLink="/" 
          style="display: inline-block; margin-top: 40px; padding: 12px 24px; background-color: #333; color: white; text-decoration: none; border-radius: 6px; cursor: pointer; font-size: 1rem;"
        >
          ⬅ Voltar para Catálogo
        </a>

        <!-- Botão de Favoritar -->
        <button
          (click)="toggleFavorite()"
          style="display: inline-block; margin-top: 40px; margin-left: 15px; padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; color: white;"
          [style.backgroundColor]="isFavorite() ? '#dc3545' : '#28a745'"
        >
          {{ isFavorite() ? 'Remover dos Favoritos' : 'Adicionar aos Favoritos' }}
        </button>
      </div>
    </div>
  } @else {
    <div style="text-align: center; padding-top: 50px;">
      <h2>Carregando detalhes... 🍿</h2>
    </div>
  }
</main>
